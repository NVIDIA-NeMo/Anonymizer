[project]
name = "anonymizer"
version = "0.1.0"
description = "NeMo Anonymizer"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"

dependencies = [
    "data-designer==0.5.0",
    "pydantic>=2.9,<3",
]

[dependency-groups]
dev = [
    "pre-commit>=4.0.0,<5",
    "pytest>=8.0,<9",
    "pytest-cov>=7.0,<8",
    "ruff>=0.12.3,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/anonymizer"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 120
indent-width = 4
target-version = "py311"

[tool.ruff.lint]
select = [
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "PIE", # flake8-pie (misc lints)
]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["anonymizer"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
