name: Copyright check

on:
  pull_request:
    branches: [main]

jobs:
  copyright-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -x -e -u -o pipefail {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.11"
          enable-cache: true

      - name: Check copyright headers
        run: make copyright-check
