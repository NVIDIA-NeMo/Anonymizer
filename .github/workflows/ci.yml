name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Telemetry is opt-out at runtime; in CI we never want to emit.
  NEMO_TELEMETRY_ENABLED: "false"
  DEFAULT_PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      # Required to use the reusable action
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: "0"

      - uses: ./.github/actions/setup-python-env
        with:
          checkout: "false"
          fetch-depth: "0"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: mise run bootstrap

      - name: Run tests with coverage
        run: mise run coverage

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      # Required to use the reusable action
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: "0"

      - uses: ./.github/actions/setup-python-env
        with:
          checkout: "false"
          fetch-depth: "0"
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}

      - name: Install dependencies
        run: mise run bootstrap

      - name: Run formatting check
        run: mise run format-check

      - name: Check copyright headers
        run: mise run copyright-check

      - name: Check uv.lock is up to date
        run: mise run lock-check

  typecheck:
    name: Type Check (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      # Required to use the reusable action
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: "0"

      - uses: ./.github/actions/setup-python-env
        with:
          checkout: "false"
          fetch-depth: "0"
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}

      - name: Install dependencies
        run: mise run bootstrap

      - name: Run type checks
        run: mise run typecheck
