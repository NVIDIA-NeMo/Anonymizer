name: Stale PR Reminder

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale-check:
    name: Check stale PRs
    if: github.repository_owner == 'NVIDIA-NeMo'
    runs-on: ubuntu-latest
    steps:
      - name: Check stale PRs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          now=$(date -u +%s)

          remind_days_external=7
          close_days_external=14
          remind_days_collaborator=14

          reminder_marker="<!-- stale-pr-reminder -->"
          close_marker="<!-- stale-pr-closed -->"

          to_epoch() {
            timestamp="$1"
            if [ -n "$timestamp" ] && [ "$timestamp" != "null" ]; then
              date -u -d "$timestamp" +%s 2>/dev/null \
                || date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$timestamp" +%s 2>/dev/null \
                || echo 0
            else
              echo 0
            fi
          }

          validate_stale_cases() {
            bucket_case='[
              {"name": "unit", "state": "FAILURE", "bucket": "fail"},
              {"name": "timeout", "state": "TIMED_OUT", "bucket": "fail"},
              {"name": "startup", "state": "STARTUP_FAILURE", "bucket": "fail"},
              {"name": "cancelled", "state": "CANCELLED", "bucket": "cancel"},
              {"name": "passed", "state": "SUCCESS", "bucket": "pass"},
              {"name": "pending", "state": "PENDING", "bucket": "pending"},
              {"name": "skipped", "state": "SKIPPED", "bucket": "skipping"}
            ]'
            failing_names=$(echo "$bucket_case" | jq -r '[.[] | select(.bucket == "fail") | .name] | join(",")')
            if [ "$failing_names" != "unit,timeout,startup" ]; then
              echo "::error::Only checks in the fail bucket should enter the stale path."
              exit 1
            fi

            cancel_count=$(echo "$bucket_case" | jq '[.[] | select(.bucket == "cancel")] | length')
            cancel_as_fail=$(echo "$bucket_case" | jq '[.[] | select(.bucket == "cancel" and .bucket == "fail")] | length')
            if [ "$cancel_count" -ne 1 ] || [ "$cancel_as_fail" -ne 0 ]; then
              echo "::error::Cancelled checks should stay out of the stale-failure list."
              exit 1
            fi

            review_activity_case='[[{"user":{"login":"alice"},"created_at":"2026-01-03T00:00:00Z","in_reply_to_id":1}]]'
            issue_activity_case='[[{"user":{"login":"maintainer"},"created_at":"2026-01-04T00:00:00Z"}]]'
            reminder_case='[[{"id":1,"body":"<!-- stale-pr-reminder -->","created_at":"2026-01-02T00:00:00Z"}]]'
            last_author_review=$(echo "$review_activity_case" | jq -r --arg author "alice" \
              'flatten | [.[] | select(.user.login == $author) | .created_at] | sort | last // empty')
            last_author_issue=$(echo "$issue_activity_case" | jq -r --arg author "alice" \
              'flatten | [.[] | select(.user.login == $author) | .created_at] | sort | last // empty')
            reminder_date=$(echo "$reminder_case" | jq -r \
              'flatten | [.[] | select(.body | contains("<!-- stale-pr-reminder -->"))] | sort_by(.created_at) | last | .created_at // empty')

            if [ -n "$last_author_issue" ]; then
              echo "::error::Maintainer comments should not count as author activity."
              exit 1
            fi
            if [ "$(to_epoch "$last_author_review")" -le "$(to_epoch "$reminder_date")" ]; then
              echo "::error::Inline author replies after a reminder should clear the reminder and prevent auto-close."
              exit 1
            fi
          }

          validate_stale_cases

          prs=$(gh pr list --repo "$REPO" --state open \
            --json number,author,labels,createdAt --limit 200)

          pr_count=$(echo "$prs" | jq 'length')
          echo "Found ${pr_count} open PRs"

          echo "$prs" | jq -c '.[]' | while IFS= read -r pr; do
            pr_num=$(echo "$pr" | jq -r '.number')
            author=$(echo "$pr" | jq -r '.author.login')
            labels=$(echo "$pr" | jq -r '[.labels[].name] | join(",")')

            echo "--- PR #${pr_num} by ${author} ---"

            if echo "$labels" | grep -q "keep-open"; then
              echo "  Skipping: has keep-open label"
              continue
            fi

            if [ "$author" = "dependabot[bot]" ]; then
              is_external=false
            else
              permission=$(gh api "repos/${REPO}/collaborators/${author}/permission" \
                --jq '.permission' 2>/dev/null || echo "none")

              is_external=true
              if [ "$permission" = "admin" ] || [ "$permission" = "write" ]; then
                is_external=false
              fi
            fi

            if [ "$is_external" = "true" ]; then
              remind_days=$remind_days_external
            else
              remind_days=$remind_days_collaborator
            fi

            set +e
            checks_json=$(gh pr checks "$pr_num" --repo "$REPO" --json name,state,bucket 2>/dev/null)
            checks_status=$?
            set -e
            if [ "$checks_status" -ne 0 ]; then
              echo "  gh pr checks exited ${checks_status}; continuing with JSON output"
            fi
            if [ -z "$checks_json" ] || ! echo "$checks_json" | jq -e 'type == "array"' >/dev/null; then
              echo "  Skipping: could not read check status"
              continue
            fi
            # Only checks normalized into the fail bucket trigger stale action.
            # The cancel bucket is ignored because cancelled checks may be
            # superseded or maintainer-initiated rather than author-fixable.
            failing=$(echo "$checks_json" | jq '[.[] | select(.bucket == "fail")] | length')

            if [ "$failing" -eq 0 ]; then
              echo "  Skipping: no failing checks"
              continue
            fi

            failing_names=$(echo "$checks_json" | jq -r '[.[] | select(.bucket == "fail") | "\(.name) (\(.state))"] | join(", ")')
            echo "  Failing checks (${failing}): ${failing_names}"

            commits_json=$(gh api --paginate --slurp \
              "repos/${REPO}/pulls/${pr_num}/commits?per_page=100" 2>/dev/null || echo "[]")
            issue_comments_json=$(gh api --paginate --slurp \
              "repos/${REPO}/issues/${pr_num}/comments?per_page=100" 2>/dev/null || echo "[]")
            review_comments_json=$(gh api --paginate --slurp \
              "repos/${REPO}/pulls/${pr_num}/comments?per_page=100" 2>/dev/null || echo "[]")

            last_push=$(echo "$commits_json" | jq -r 'flatten | [.[] | .commit.committer.date] | sort | last // empty')
            last_issue_comment=$(echo "$issue_comments_json" | jq -r --arg author "$author" \
              'flatten | [.[] | select(.user.login == $author) | .created_at] | sort | last // empty')
            last_review_comment=$(echo "$review_comments_json" | jq -r --arg author "$author" \
              'flatten | [.[] | select(.user.login == $author) | .created_at] | sort | last // empty')

            last_push_epoch=$(to_epoch "$last_push")
            last_issue_comment_epoch=$(to_epoch "$last_issue_comment")
            last_review_comment_epoch=$(to_epoch "$last_review_comment")

            last_activity_epoch=$last_push_epoch
            if [ "$last_issue_comment_epoch" -gt "$last_activity_epoch" ]; then
              last_activity_epoch=$last_issue_comment_epoch
            fi
            if [ "$last_review_comment_epoch" -gt "$last_activity_epoch" ]; then
              last_activity_epoch=$last_review_comment_epoch
            fi

            if [ "$last_activity_epoch" -eq 0 ]; then
              created=$(echo "$pr" | jq -r '.createdAt')
              last_activity_epoch=$(to_epoch "$created")
              if [ "$last_activity_epoch" -eq 0 ]; then
                last_activity_epoch=$now
              fi
            fi

            days_inactive=$(( (now - last_activity_epoch) / 86400 ))
            echo "  Days inactive: ${days_inactive} (remind=${remind_days}, external=${is_external})"

            reminder_json=$(echo "$issue_comments_json" | jq -c --arg marker "$reminder_marker" \
              'flatten | [.[] | select(.body | contains($marker))] | sort_by(.created_at) | last // empty')

            has_reminder=0
            if [ -n "$reminder_json" ]; then
              has_reminder=1
              reminder_id=$(echo "$reminder_json" | jq -r '.id')
              reminder_date=$(echo "$reminder_json" | jq -r '.created_at')
              reminder_epoch=$(to_epoch "$reminder_date")

              # Validation case: if a stale reminder was posted at T1 and the
              # PR author leaves an inline review reply at T2 > T1, the review
              # comment timestamp becomes last_activity_epoch. The reminder is
              # deleted, has_reminder resets to 0, and auto-close is skipped.
              if [ "$last_activity_epoch" -gt "$reminder_epoch" ]; then
                echo "  Activity after reminder - deleting stale reminder, resetting timer"
                gh api -X DELETE "repos/${REPO}/issues/comments/${reminder_id}" 2>/dev/null || true
                has_reminder=0
              fi
            fi

            if [ "$is_external" = "true" ] && [ "$days_inactive" -ge "$close_days_external" ] && [ "$has_reminder" -gt 0 ]; then
              echo "  Closing external PR #${pr_num} (inactive ${days_inactive} days, reminder was posted)"

              close_body=$(cat <<MSG
          ${close_marker}
          ### Auto-closed: inactive PR

          This external PR has been automatically closed after ${days_inactive} days of inactivity
          with failing checks.

          Feel free to reopen this PR once you're ready to address the outstanding checks.
          If you believe this was closed in error, ask a maintainer to add the \`keep-open\` label and reopen.
          MSG
          )
              echo "$close_body" > /tmp/close-body.md
              gh pr comment "$pr_num" --repo "$REPO" --body-file /tmp/close-body.md
              gh pr close "$pr_num" --repo "$REPO"

            elif [ "$days_inactive" -ge "$remind_days" ] && [ "$has_reminder" -eq 0 ]; then
              echo "  Posting reminder on PR #${pr_num} (inactive ${days_inactive} days)"

              if [ "$is_external" = "true" ]; then
                grace_left=$(( close_days_external - days_inactive ))
                if [ "$grace_left" -lt 1 ]; then
                  grace_left=1
                fi

                remind_body=$(cat <<MSG
          ${reminder_marker}
          ### Stale PR reminder

          This PR has had failing checks for **${days_inactive} days** without author activity.

          **Failing checks (\`fail\` bucket):** ${failing_names}

          Please push an update or leave a comment if you're still working on this.
          Otherwise, this external PR will be automatically closed in **${grace_left} days**.

          To prevent auto-close, ask a maintainer to add the \`keep-open\` label.
          MSG
          )
              else
                remind_body=$(cat <<MSG
          ${reminder_marker}
          ### Stale PR reminder

          This PR has had failing checks for **${days_inactive} days** without author activity.

          **Failing checks (\`fail\` bucket):** ${failing_names}

          Please push an update or leave a comment if you're still working on this.
          No automatic close action will be taken for collaborator PRs.

          To stop reminders, add the \`keep-open\` label.
          MSG
          )
              fi

              echo "$remind_body" > /tmp/remind-body.md
              gh pr comment "$pr_num" --repo "$REPO" --body-file /tmp/remind-body.md

            else
              echo "  No action needed"
            fi
          done

          echo "Stale PR check complete"
