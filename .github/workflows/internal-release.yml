name: "Internal Release"

on:
  push:
    tags: ['v[0-9]*']
  workflow_dispatch:
    inputs:
      release-ref:
        description: Branch, tag, or full SHA to build
        required: true
        default: main
        type: string

jobs:
  publish:
    name: Build and publish wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release-ref || github.ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-python-env
        with:
          ref: ${{ inputs.release-ref || github.ref }}
          fetch-depth: "0"
      - name: Build and publish to PyPI
        run: make publish-pypi
        env:
          TWINE_USERNAME: ${{ secrets.TWINE_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.TWINE_PASSWORD }}
      - name: Show built version
        id: version
        run: |
          WHEEL=$(ls dist/*.whl)
          VERSION=$(echo "$WHEEL" | sed -n 's/.*-\([0-9][^-]*\)-.*/\1/p')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: nemo-anonymizer-${{ steps.version.outputs.version }}
          path: dist/*.whl
          retention-days: 90
