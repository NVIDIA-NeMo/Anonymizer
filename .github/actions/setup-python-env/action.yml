name: "Setup Python Environment"
description: "Common setup for Python projects: checkout, mise, Python, and dependencies"

inputs:
  ref:
    description: "Git ref to checkout (branch, tag, or SHA). Defaults to the triggering event ref."
    required: false
    default: ""
  python-version:
    description: "Python version to use (defaults to .python-version when empty)"
    required: false
    default: ""
  fetch-depth:
    description: "Number of commits to fetch (0 for all history)"
    required: false
    default: "1"
  checkout:
    description: "Whether to checkout the repository before setting up the environment"
    required: false
    default: "true"

outputs:
  merge-base:
    description: "The merge base SHA (only available when fetch-depth is 0)"
    value: ${{ steps.get_merge_base.outputs.merge_base }}

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      if: inputs.checkout == 'true'
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref || github.ref }}
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Get the merge base SHA
      id: get_merge_base
      if: inputs.checkout == 'true' && inputs.fetch-depth == '0'
      shell: bash
      run: |
        if [ -n "${{ github.base_ref }}" ]; then
          # Pull request: diff against the merge base with the target branch
          MERGE_BASE_SHA=$(git merge-base origin/${{ github.base_ref }} ${{ github.sha }})
        else
          # Push to branch: diff against the previous commit
          MERGE_BASE_SHA=$(git rev-parse HEAD~1)
        fi
        echo "Merge Base SHA: $MERGE_BASE_SHA"
        echo "merge_base=$MERGE_BASE_SHA" >> $GITHUB_OUTPUT

    - name: Set up Python ${{ inputs.python-version }}
      if: inputs.python-version != ''
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up Python from .python-version
      if: inputs.python-version == ''
      uses: actions/setup-python@v6
      with:
        python-version-file: ".python-version"

    - name: Install mise and project tools
      shell: bash
      run: |
        MISE_GPG_KEY=24853EC9F655CE80B48E6C3A8B81C9D17413A06D \
          bash tools/install-mise.sh
        export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"
        MISE_YES=1 mise trust
        MISE_YES=1 mise run setup
