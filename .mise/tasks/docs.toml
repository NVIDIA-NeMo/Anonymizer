["docs:serve"]
description = "Serve the MkDocs site locally at http://127.0.0.1:8000."
alias = "docs-serve"
run = "uv run --group docs mkdocs serve"

["docs:build"]
description = "Build the documentation site in strict mode."
alias = "docs-build"
run = "uv run --group docs mkdocs build --strict"
