default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: format
        name: Format
        language: system
        entry: uv run tools/codestyle/format.sh
        types: [python]
        pass_filenames: true

      - id: typecheck
        name: Typecheck (advisory)
        language: system
        entry: bash -c 'tools/codestyle/typecheck.sh || true'
        types: [python]
        pass_filenames: false
        verbose: true

      - id: copyright-fix
        name: Copyright Fix
        language: system
        entry: uv run --script tools/codestyle/copyright_fixer.py
        types_or: [python, shell]
        pass_filenames: true

      - id: uv-lock
        name: uv lock check
        language: system
        entry: bash -c 'uv lock && git diff --exit-code uv.lock'
        files: pyproject.toml
        stages: [pre-commit]
        pass_filenames: false

      - id: check-signoff
        name: Check commit is signed off (DCO)
        entry: "grep -qE '^Signed-off-by: .+ <.+>'"
        language: system
        stages: [commit-msg]
        always_run: true
