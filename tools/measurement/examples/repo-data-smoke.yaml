suite_id: repo-data-smoke
workloads:
  - id: biographies
    source: ../../../docs/data/NVIDIA_synthetic_biographies.csv
    text_column: biography
    row_limit: 5
  - id: legal
    source: ../../../docs/data/TAB_legal_sample25.csv
    text_column: text
    row_limit: 5
configs:
  - id: biographies-redact-default
    replace: redact
  - id: legal-hash-agent-labels
    detect:
      entity_labels: [person, email, api_key, password]
    replace:
      strategy: hash
      digest_length: 12
matrix:
  - workload: biographies
    config: biographies-redact-default
  - workload: legal
    config: legal-hash-agent-labels
